# Local dev stack — Postgres + MinIO. Run from repo root: docker compose -f ops/docker-compose.yml up
# Or use the wrapper: ops/dev.sh up

services:
  postgres:
    image: postgres:15
    container_name: pettycash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pettycash
      POSTGRES_USER: pettycash
      POSTGRES_PASSWORD: pettycash
    ports:
      - "5432:5432"
    volumes:
      - pettycash_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pettycash -d pettycash"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pettycash-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_admin12
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - pettycash_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pettycash_pg_data:
  pettycash_minio_data:
