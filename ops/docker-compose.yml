# Local dev stack. RabbitMQ joins when async report generation is introduced.

services:
  postgres:
    image: postgres:15-alpine
    container_name: pdd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pdd
      POSTGRES_PASSWORD: pdd
      POSTGRES_DB: pdd_petty_cash
    ports:
      - "5432:5432"
    volumes:
      - pdd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdd -d pdd_petty_cash"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: pdd_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pdd
      MINIO_ROOT_PASSWORD: pdd-minio-secret
    ports:
      # Host ports 9100/9101 to avoid collision with another local MinIO on
      # 9000/9001. Inside the compose network, services still address minio:9000.
      - "9100:9000"   # S3 API
      - "9101:9001"   # Web console
    volumes:
      - pdd_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot job: creates the receipts bucket once MinIO is up so the backend
  # doesn't have to do bootstrap-on-startup gymnastics.
  minio_init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    container_name: pdd_minio_init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 pdd pdd-minio-secret &&
        mc mb --ignore-existing local/pdd-receipts &&
        echo 'pdd-receipts bucket ready.'
      "

volumes:
  pdd_postgres_data:
    name: pdd_postgres_data
  pdd_minio_data:
    name: pdd_minio_data
