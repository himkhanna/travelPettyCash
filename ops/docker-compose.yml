# Local dev stack. Phase 1 = Postgres only. MinIO is added when the receipt-
# upload slice lands. RabbitMQ when async report generation is introduced.

services:
  postgres:
    image: postgres:15-alpine
    container_name: pdd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pdd
      POSTGRES_PASSWORD: pdd
      POSTGRES_DB: pdd_petty_cash
    ports:
      - "5432:5432"
    volumes:
      - pdd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdd -d pdd_petty_cash"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pdd_postgres_data:
    name: pdd_postgres_data
