name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  # 3.32.x is the May-2025 stable. Phase 0 code uses `Color.withValues`
  # (Flutter 3.27+) and `CardThemeData` style cardTheme.
  FLUTTER_VERSION: '3.32.0'

jobs:
  mobile:
    name: Flutter (analyze + test + web build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('mobile/pubspec.yaml') }}

      - name: flutter pub get
        run: flutter pub get

      # Don't gate the build on cosmetics — record violations but keep going.
      - name: dart format check
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed lib test

      - name: flutter analyze
        id: analyze
        continue-on-error: true
        run: |
          flutter analyze 2>&1 | tee analyze.log
          echo "exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload analyze log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analyze-log
          path: mobile/analyze.log
          if-no-files-found: ignore

      - name: flutter test
        continue-on-error: true
        run: flutter test --coverage 2>&1 | tee test.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: mobile/test.log
          if-no-files-found: ignore

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: mobile/coverage/lcov.info
          if-no-files-found: ignore

      # Phase 1 hasn't committed platform stubs (web/, android/, ios/) since the
      # demo only targets web. Generate them on the fly here.
      - name: flutter create platforms
        run: flutter create --platforms=web --project-name=pdd_petty_cash .

      - name: flutter build web
        continue-on-error: true
        run: flutter build web --release --base-href / 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: mobile/build.log
          if-no-files-found: ignore

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: mobile/build/web

  openapi-lint:
    name: OpenAPI spec lint
    runs-on: ubuntu-latest
    continue-on-error: true  # informational only until ruleset is tuned
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Redocly CLI
        run: npm install -g @redocly/cli
      - name: Lint OpenAPI
        run: redocly lint docs/api/openapi.yaml || true
