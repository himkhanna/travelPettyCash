name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  # 3.32.x is the May-2025 stable. Phase 0 code uses `Color.withValues`
  # (Flutter 3.27+) and `CardThemeData` style cardTheme.
  FLUTTER_VERSION: '3.32.0'

jobs:
  mobile:
    name: Flutter (analyze + test + web build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('mobile/pubspec.yaml') }}

      - name: flutter pub get
        run: flutter pub get

      # Don't gate the build on cosmetics — record violations but keep going.
      - name: dart format check
        continue-on-error: true
        run: dart format --output=none --set-exit-if-changed lib test

      - name: flutter analyze
        run: flutter analyze --fatal-infos

      - name: flutter test
        run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: mobile/coverage/lcov.info
          if-no-files-found: ignore

      - name: flutter build web
        run: flutter build web --release --base-href /

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: mobile/build/web

  openapi-lint:
    name: OpenAPI spec lint
    runs-on: ubuntu-latest
    continue-on-error: true  # informational only until ruleset is tuned
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Redocly CLI
        run: npm install -g @redocly/cli
      - name: Lint OpenAPI
        run: redocly lint docs/api/openapi.yaml || true
