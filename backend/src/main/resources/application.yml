spring:
  application:
    name: pdd-pettycash-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pettycash}
    username: ${DB_USER:pettycash}
    password: ${DB_PASS:pettycash}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  forward-headers-strategy: framework

pettycash:
  auth:
    # HS256 demo secret. Override via PETTYCASH_AUTH_SECRET in any non-dev env.
    secret: ${PETTYCASH_AUTH_SECRET:dev-only-secret-change-me-please-32+chars}
    accessTtlMinutes: 60
  cors:
    allowedOrigins:
      - http://localhost:59045
      - http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{20} - %msg%n"
  level:
    org.springframework.security: INFO
    ae.gov.pdd: DEBUG
