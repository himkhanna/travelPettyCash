spring:
  application:
    name: pettycash
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pettycash}
    username: ${DB_USERNAME:pettycash}
    password: ${DB_PASSWORD:pettycash}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Mock OIDC / JWT — TODO(§16): replace with real UAE Pass + PDD SSO clients
pettycash:
  jwt:
    issuer: pettycash-dev
    secret: ${JWT_SECRET:dev-only-secret-please-replace-with-32-bytes-min-length-key-2026}
    access-ttl-minutes: 15
    refresh-ttl-days: 14
  storage:
    bucket: ${MINIO_BUCKET:pettycash-receipts}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minio_admin}
    secret-key: ${MINIO_SECRET_KEY:minio_admin12}
    region: ${MINIO_REGION:us-east-1}

logging:
  level:
    root: INFO
    ae.gov.pdd.pettycash: INFO
    org.springframework.security: INFO
