# Defaults — every profile inherits these. Profile-specific overrides live in
# application-<profile>.yml. Secrets are NEVER hard-coded; the placeholders
# below resolve from environment variables in every environment (CLAUDE.md §12).

spring:
  application:
    name: pdd-petty-cash-backend

  datasource:
    url: ${PDD_DB_URL:jdbc:postgresql://localhost:5432/pdd_petty_cash}
    username: ${PDD_DB_USER:pdd}
    password: ${PDD_DB_PASSWORD:pdd}
    hikari:
      maximum-pool-size: 10
      pool-name: pdd-pool

  jpa:
    hibernate:
      ddl-auto: none      # CLAUDE.md §3: never auto-DDL; Flyway owns schema.
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PDD_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# --- Application configuration ------------------------------------------------
pdd:
  auth:
    jwt:
      # 32+ byte secret for HS256. MUST be overridden in every real environment.
      secret:      ${PDD_JWT_SECRET:change-me-this-is-a-dev-only-secret-not-for-prod-32b}
      issuer:      pdd-petty-cash
      access-ttl:  PT15M
    refresh:
      ttl:         P30D
  cors:
    # Closed by default. The CMS web origin is added in -local / -prod overlays.
    allowed-origins: ${PDD_CORS_ORIGINS:}
  storage:
    # MinIO (S3-compatible). Override every value in prod to point at the
    # sovereign object store and rotate keys via Vault per CLAUDE.md §12.
    endpoint:   ${PDD_STORAGE_ENDPOINT:http://localhost:9000}
    access-key: ${PDD_STORAGE_ACCESS_KEY:pdd}
    secret-key: ${PDD_STORAGE_SECRET_KEY:pdd-minio-secret}
    bucket:     ${PDD_STORAGE_BUCKET:pdd-receipts}
    presigned-ttl: PT5M
  ocr:
    # Path to the tessdata directory containing the .traineddata files for
    # the languages listed below. Empty value = use Tesseract's compiled
    # default (TESSDATA_PREFIX env var or the platform install path).
    # Windows install via UB Mannheim build: typically
    #   C:/Program Files/Tesseract-OCR/tessdata
    tessdata-path: ${PDD_OCR_TESSDATA_PATH:}
    # Plus-separated language codes. eng is required; add ara to read
    # Arabic-language receipts (download ara.traineddata into the path
    # above and set this to "eng+ara").
    languages:     ${PDD_OCR_LANGUAGES:eng}
  demo:
    seed: false
