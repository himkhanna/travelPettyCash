spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pdd_petty_cash
    username: pdd
    password: pdd

  jpa:
    properties:
      hibernate:
        format_sql: true

pdd:
  cors:
    # Flutter web dev server + Swagger UI on the same host. Both localhost
    # and 127.0.0.1 forms are listed because browsers treat them as
    # distinct origins for CORS, and the static-served demo bundle is
    # opened at http://127.0.0.1:5173/ during local smoke runs. The
    # 192.168.1.46 entries cover the LAN-bound dev server used when
    # testing on a real iPhone over Wi-Fi.
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080,http://localhost:3000,http://192.168.1.46:5173,http://192.168.1.46:8080
  storage:
    # docker-compose maps the MinIO API to host port 9100 to avoid collisions
    # with another local MinIO; container-to-container traffic uses minio:9000.
    endpoint: http://localhost:9100
  ocr:
    # UB Mannheim Tesseract installer default. Pointing install-dir here
    # lets ReceiptOcrService prepend it to jna.library.path so JNA finds
    # libtesseract*.dll without requiring the user to add the dir to PATH,
    # and auto-derives tessdata-path from <install-dir>/tessdata.
    # Stays 'eng' until ara.traineddata is added — re-run the installer
    # with "Additional language data → Arabic" ticked, then set 'eng+ara'.
    install-dir: C:/Program Files/Tesseract-OCR
    languages: eng
  demo:
    seed: true
