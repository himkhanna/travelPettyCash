spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pdd_petty_cash
    username: pdd
    password: pdd

  jpa:
    properties:
      hibernate:
        format_sql: true

pdd:
  cors:
    # Flutter web dev server + Swagger UI on the same host. Both localhost
    # and 127.0.0.1 forms are listed because browsers treat them as
    # distinct origins for CORS, and the static-served demo bundle is
    # opened at http://127.0.0.1:5173/ during local smoke runs. The
    # 192.168.1.46 entries cover the LAN-bound dev server used when
    # testing on a real iPhone over Wi-Fi.
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080,http://localhost:3000,http://192.168.1.46:5173,http://192.168.1.46:8080
  storage:
    # docker-compose maps the MinIO API to host port 9100 to avoid collisions
    # with another local MinIO; container-to-container traffic uses minio:9000.
    endpoint: http://localhost:9100
  ocr:
    # UB Mannheim Tesseract installer default. Pointing install-dir here
    # lets ReceiptOcrService prepend it to jna.library.path so JNA finds
    # libtesseract*.dll without requiring the user to add the dir to PATH,
    # and auto-derives tessdata-path from <install-dir>/tessdata.
    # Stays 'eng' until ara.traineddata is added — re-run the installer
    # with "Additional language data → Arabic" ticked, then set 'eng+ara'.
    install-dir: C:/Program Files/Tesseract-OCR
    languages: eng
  demo:
    seed: true
  auth:
    # Smart Dubai / "DDA" OIDC SSO. Off by default; flip enabled to
    # true once you've set PDD_SMARTDUBAI_CLIENT_ID and
    # PDD_SMARTDUBAI_CLIENT_SECRET in backend/.env. Defaults below
    # point at the demo tenant. See docs/architecture/ADR-001-dda-sso.md.
    dubaigov:
      enabled: ${PDD_SMARTDUBAI_ENABLED:false}
      # DEV-ONLY in-process fake IdP. When true, the authorize/token/
      # userinfo URIs below are repointed at MockIdpController so the
      # full flow runs without a redirect URI registered on the real
      # demo tenant. Never set this outside local dev.
      mock-idp: ${PDD_SMARTDUBAI_MOCK_IDP:false}
      client-id: ${PDD_SMARTDUBAI_CLIENT_ID:}
      client-secret: ${PDD_SMARTDUBAI_CLIENT_SECRET:}
      redirect-uri: http://localhost:8080/api/v1/auth/sso/callback
      authorization-uri: https://demoidp.dubai.gov.ae/mga/sps/oauth/oauth20/authorize
      token-uri: https://demoidp.dubai.gov.ae/mga/sps/oauth/oauth20/token
      user-info-uri: https://demoidp.dubai.gov.ae/mga/sps/oauth/oauth20/userinfo
      issuer: https://demoidp.dubai.gov.ae
      saml-slo-uri: https://demoidp.dubai.gov.ae/isam/sps/idpdubaigov/saml20/sloinitial
      web-mobile-callback: http://localhost:5173/app/auth/callback
      web-portal-callback: http://localhost:5173/portal/auth/callback
      native-callback: ae.gov.pdd.pettycash://auth/callback
      scopes: openid profile email
      role-claim: groups
      role-mapping:
        pdd.delegation-expenses.super-admin: SUPER_ADMIN
        pdd.delegation-expenses.admin: ADMIN
        pdd.delegation-expenses.leader: LEADER
        pdd.delegation-expenses.member: MEMBER
      default-role: MEMBER
    # UAE Pass (TDRA national digital ID). Off by default; flip enabled
    # to true to light up the "Sign in with UAE Pass" button. Defaults
    # target the public staging sandbox (sandbox_stage credentials). UAE
    # Pass returns identity only — role comes from the linked local
    # account. See docs/architecture/ADR-002-uaepass-sso.md.
    uaepass:
      enabled: ${PDD_UAEPASS_ENABLED:false}
      client-id: ${PDD_UAEPASS_CLIENT_ID:sandbox_stage}
      client-secret: ${PDD_UAEPASS_CLIENT_SECRET:sandbox_stage}
      redirect-uri: http://localhost:8080/api/v1/auth/sso/uaepass/callback
      authorization-uri: https://stg-id.uaepass.ae/idshub/authorize
      token-uri: https://stg-id.uaepass.ae/idshub/token
      user-info-uri: https://stg-id.uaepass.ae/idshub/userinfo
      logout-uri: https://stg-id.uaepass.ae/idshub/logout
      web-mobile-callback: http://localhost:5173/app/auth/uaepass/callback
      web-portal-callback: http://localhost:5173/portal/auth/uaepass/callback
      scope: urn:uae:digitalid:profile:general
      acr-values: urn:safelayer:tws:policies:authentication:level:low
