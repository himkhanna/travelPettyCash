# Test profile defaults. The Testcontainers integration test overrides
# the datasource via @DynamicPropertySource so jdbc:postgresql:// host/port
# point at the ephemeral container.

pdd:
  auth:
    jwt:
      secret: change-me-this-is-a-dev-only-secret-not-for-prod-32b
      issuer: pdd-petty-cash
      access-ttl: PT15M
    refresh:
      ttl: P30D
  cors:
    allowed-origins: ""
  storage:
    # Overridden per IT by @DynamicPropertySource pointing at the MinIO container.
    endpoint: http://localhost:9000
    access-key: pdd
    secret-key: pdd-minio-secret
    bucket: pdd-receipts
    presigned-ttl: PT5M
  demo:
    seed: true
