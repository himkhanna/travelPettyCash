# Local-dev Docker host. The npipe:////./pipe/docker_engine path is
# intercepted by Docker Desktop's hardened socket proxy on this machine
# and rejects docker-java's API probe; the TCP socket exposed via
# Settings → General → "Expose daemon on tcp://localhost:2375 without TLS"
# works. CI Linux runners ignore this file and use the standard unix socket.
docker.host=tcp://localhost:2375
