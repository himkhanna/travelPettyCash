name: pdd_petty_cash
description: PDD Petty Cash — multi-currency petty cash and per-diem management for protocol officers.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Networking (used later when ApiRepositories land; in scaffold for type wiring)
  dio: ^5.5.0

  # Local storage
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # DTOs / data classes
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Localization & formatting
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.68.0

  # Media (receipts)
  image_picker: ^1.1.2
  image_cropper: ^7.1.0

  # Connectivity (offline detection for sync coordinator)
  connectivity_plus: ^6.0.3

  # Misc
  uuid: ^4.4.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/demo/
    - assets/demo/receipts/
    - assets/icons/

  # Fonts will be added when the PDD-approved typeface is supplied.
  # fonts:
  #   - family: PDDDisplay
  #     fonts:
  #       - asset: assets/fonts/PDDDisplay-Regular.ttf
