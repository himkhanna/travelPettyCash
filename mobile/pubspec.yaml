name: pdd_petty_cash
description: PDD Petty Cash — multi-currency petty cash and per-diem management for protocol officers.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  # 3.27+ required for Color.withValues + CardThemeData APIs used in the theme.
  flutter: '>=3.27.0'

# Slim Phase 1 dependency set: only what the demo actively uses. Drift,
# secure_storage, image_cropper, codegen toolchain, etc. land in Phase 3
# when the real API client + receipt pipeline arrive.
dependencies:
  collection: ^1.19.0
  connectivity_plus: ^6.1.0
  dio: ^5.7.0
  fl_chart: ^0.69.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/demo/
    - assets/demo/receipts/
    - assets/icons/
