include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - "lib/l10n/generated/**"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    invalid_annotation_target: ignore
    # Style preferences we want to relax during Phase 1 (UI-first demo).
    # These are info-level lints — they would gate the build on cosmetics
    # rather than correctness. Re-tighten in Phase 3 when the API client
    # lands and we can iterate without churn.
    avoid_dynamic_calls: ignore
    require_trailing_commas: ignore
    prefer_single_quotes: ignore

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_locals
    - sort_pub_dependencies
    - unawaited_futures
    - use_key_in_widget_constructors
